<h2>Start New Run</h2>
<form action="/start_run" method="post">
  Name: <input name="name"><br>
  Description: <input name="desc"><br>
  <button type="submit">Start</button>
</form>

<h2>Runs</h2>
<ul>
{% for run in runs %}
  <li>
    {{ run[1] }} -
    <a href="/run/{{ run[0] }}">View</a> |
    <a href="/stop_run/{{ run[0] }}">Stop</a>
  </li>
{% endfor %}
</ul>

<h2>Pump Control</h2>
<a href="/pump/on">ON</a> |
<a href="/pump/off">OFF</a>
